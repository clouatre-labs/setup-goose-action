name: AI Analysis - Balanced Security
on: [pull_request]

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Setup Goose CLI
        uses: clouatre-labs/setup-goose-action@35f35c3a8f08aa333486693114938ec643bf8310  # v1.0.7

      - name: Generate Diff Stats
        run: git diff --stat origin/${{ github.base_ref }}...HEAD > diff-stats.txt

      - name: AI Analysis
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          mkdir -p ~/.config/goose
          cat > ~/.config/goose/config.yaml << 'EOF'
          GOOSE_PROVIDER: openrouter
          GOOSE_MODEL: inception/mercury-2
          keyring: false
          EOF
          
          echo "Review these changes:" > prompt.txt
          cat diff-stats.txt >> prompt.txt
          goose run --instructions prompt.txt --no-session --quiet > review.md

      - name: Upload Review Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: ai-review
          path: review.md

  post:
    needs: analyze
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      pull-requests: write
    steps:
      - name: Download Review Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: ai-review

      - name: Post Review Comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
